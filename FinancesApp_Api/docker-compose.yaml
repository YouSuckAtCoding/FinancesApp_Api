  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1470:1433"
    environment:
      SA_PASSWORD: "Numsey@Password!"
      ACCEPT_EULA: "Y"
  
  redis:
    image: redis:latest
    ports:
      - "1405:6379"
 
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yaml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
